<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6366f1">
    <title>Salary Envelope Planner</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://unpkg.com/i18next@23.11.2/i18next.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --radius: 16px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-card: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        [dir="rtl"] { font-family: 'Tajawal', 'Segoe UI', Tahoma, sans-serif; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            transition: background 0.3s;
            overflow-x: hidden;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 80px;
        }

        body.what-if-active { background: #fff1f2; }
        .what-if-banner {
            display: none;
            background: var(--danger);
            color: white;
            padding: 12px;
            text-align: center;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 2000;
            box-shadow: var(--shadow);
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); }
            to { transform: translateY(0); }
        }
        body.what-if-active .what-if-banner { display: block; }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
            color: white;
            padding: 40px 30px;
            border-radius: var(--radius);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-header {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            backdrop-filter: blur(8px);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border-bottom: 4px solid var(--primary);
            background: rgba(255, 255, 255, 0.95);
        }

        .stat-label { font-size: 13px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
        .stat-val { font-size: 28px; font-weight: 800; margin-top: 10px; }
                .stat-sub { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-top: 6px; }

        .tabs {
            display: flex;
            gap: 8px;
                                        margin-bottom: 30px;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 14px;
                                    width: fit-content;
        }
        .tab {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 700;
            color: var(--text-muted);
            transition: all 0.2s;
        }
        .tab.active { background: white; color: var(--primary); box-shadow: var(--shadow); }

        .env-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
        }

        .env-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 30px;
            box-shadow: var(--shadow);
            position: relative;
            border-left: 8px solid #cbd5e0;
        }
        [dir="rtl"] .env-card { border-left: none; border-right: 8px solid #cbd5e0; }
        .env-card.goal { border-color: var(--success); }
        .env-card.debt { border-color: var(--danger); }
        .env-card.budget { border-color: var(--warning); }

        .progress-container {
            height: 10px;
            background: #f1f5f9;
            border-radius: 5px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-bar { height: 100%; transition: width 0.6s ease; }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal.active { display: flex; }
        .modal-body {
            background: white;
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 550px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .field {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .badge-budget { background: #fef3c7; color: #92400e; }
        .badge-debt { background: #fee2e2; color: #991b1b; }
        .badge-goal { background: #d1fae5; color: #065f46; }

        .pane { display: none; }
        .pane.active { display: block; }
        
        @media (max-width: 768px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
            header { flex-direction: column; text-align: center; gap: 20px; }
        }
/* Table-like Summary Styles */
#summaryTableContainer table {
  width: 100%;
  border-collapse: collapse;
    
  #summaryTableContainer {
    overflow-x: auto;
  }
  #summaryTableContainer th,
  #summaryTableContainer td {
    padding: 12px 14px;
    font-size: 12px;
  }
  background: var(--card-bg);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
}

#summaryTableContainer thead {
  background: linear-gradient(135deg, var(--primary) 0%, #a855f7 100%);
  color: white;
}

#summaryTableContainer th {
  padding: 16px 20px;
  text-align: left;
  font-weight: 700;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

[dir="rtl"] #summaryTableContainer th {
  text-align: right;
}

#summaryTableContainer tbody tr {
  border-bottom: 1px solid #e2e8f0;
  transition: background 0.2s;
}

#summaryTableContainer tbody tr:hover {
  background: #f8fafc;
}

#summaryTableContainer tbody tr:nth-child(even) {
  background: #f9fafb;
}

#summaryTableContainer tbody tr:nth-child(even):hover {
  background: #f1f5f9;
}

#summaryTableContainer td {
  padding: 14px 20px;
  font-size: 14px;
}

#summaryTableContainer td:first-child {
  font-weight: 600;
  color: var(--text-main);
}

        
    </style>
</head>
<body>

<div class="what-if-banner" data-i18n="sandbox_active">⚠️ Sandbox mode active - changes not saved</div>

<div class="container">
    <header>
        <div>
            <h1 data-i18n="app_title">💰 Salary Planner</h1>
            <p data-i18n="real_time_plan">Real-Time Financial Plan</p>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-header" id="importBtn" data-i18n="import">Import</button>
            <button class="btn btn-header" id="exportBtn" data-i18n="export">Export</button>
            <button class="btn btn-header" id="sandboxBtn" data-i18n="act_sandbox">Activate What-If</button>
            <button class="btn btn-header" id="langBtn">English</button>
            <input type="file" id="fileInput" style="display:none" onchange="importData(event)">
        </div>
    </header>

    <div id="overAllocWarning" style="display:none; background:var(--danger); color:white; padding:15px; border-radius:12px; margin-bottom:20px; font-weight:bold; align-items:center; gap:10px;">
        ⚠️ <span data-i18n="warning_overAllocated">Warning: Total allocations exceed net monthly salary</span>
    </div>

    <div class="summary-grid" id="highLevelSummary"></div>

    <div class="tabs">
        <button class="tab active" id="tab-env" onclick="showTab('env')" data-i18n="tab_env">The Envelopes</button>
        <button class="tab" id="tab-visual" onclick="showTab('visual')" data-i18n="tab_visual">Visual Timeline</button>
        <button class="tab" id="tab-settings" onclick="showTab('settings')" data-i18n="tab_settings">Settings</button>
    </div>

    <div id="envSection" class="pane active">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 data-i18n="sec_envelopes">Monthly Envelopes</h2>
            <button class="btn" style="background:var(--primary); color:white;" onclick="openAddModal()" data-i18n="btn_add_env">+ Add Envelope</button>
        </div>
        <div id="summaryTableContainer" style="margin-bottom:30px; overflow-x:auto; background:white; padding:20px; border-radius:16px; box-shadow:var(--shadow);"></div>
        <div id="categorySections"></div>
    </div>

    <div id="visualSection" class="pane">
        <h2 data-i18n="sec_timeline" style="margin-bottom:20px;">Financial Freedom Timeline</h2>
        <div id="ganttChart" style="background:white; padding:30px; border-radius:16px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:20px;"></div>
    </div>

    <div id="settingsSection" class="pane">
        <div style="max-width:600px;">
            <h2 data-i18n="sec_config" style="margin-bottom:20px;">Configuration</h2>
            <div style="background:white; padding:30px; border-radius:16px; box-shadow:var(--shadow);">
                <label data-i18n="lbl_monthly_salary">Monthly Salary</label>
                <input type="number" id="cfgSalary" class="field" onchange="updateGlobal()">
                
                <label data-i18n="lbl_start_date">Plan Start Date</label>
                <input type="date" id="cfgDate" class="field" onchange="updateGlobal()">
                
                <div style="margin-top:30px; display:flex; gap:15px;">
                    <button class="btn" style="background:var(--danger); color:white;" onclick="resetAll()" data-i18n="btn_reset">Reset All Data</button>
                    <button class="btn" style="background:var(--warning); color:white;" id="demoBtn">🔄 Load Clean Demo Data</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="envModal" class="modal">
    <div class="modal-body">
        <h2 id="modalTitle" style="margin-bottom:25px;">Add Envelope</h2>
        <form id="envForm">
            <label data-i18n="col_name">Name</label>
            <input type="text" id="mName" class="field" required>
            
            <label data-i18n="col_type">Type</label>
            <select id="mType" class="field" onchange="toggleModalFields()">
                <option value="budget" data-i18n="budget">Budget</option>
                <option value="debt" data-i18n="debt">Debt</option>
                <option value="goal" data-i18n="goal">Goal</option>
            </select>

            <div id="targetGrp">
                <label data-i18n="col_target">Target Amount</label>
                <input type="number" id="mTarget" class="field" oninput="updateModalSuggest()">
            </div>

            <div id="dueGrp">
                <label data-i18n="col_due">Due Date</label>
                <input type="date" id="mDue" class="field" onchange="updateModalSuggest()">
            </div>

            <div id="modalSuggest" style="margin-bottom:15px; padding:10px; background:#f0fdf4; border-radius:8px; font-size:13px; display:none;"></div>

            <label data-i18n="col_current">Initial Balance</label>
            <input type="number" id="mCurrent" class="field" value="0">

            <label data-i18n="col_alloc">Monthly Deposit</label>
            <input type="number" id="mMonthly" class="field" value="0">

            <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:20px;">
                <button type="button" class="btn" onclick="closeModal()" data-i18n="btn_cancel">Cancel</button>
                <button type="submit" class="btn" style="background:var(--primary); color:white;" data-i18n="btn_save">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<div id="historyModal" class="modal">
    <div class="modal-body">
        <h2 data-i18n="lbl_transaction_history" style="margin-bottom:20px;">Transaction History</h2>
        <div id="historyContent"></div>
        <button class="btn" style="width:100%; margin-top:20px;" onclick="document.getElementById('historyModal').classList.remove('active')" data-i18n="btn_cancel">Close</button>
    </div>
</div>

<script>
    let realData = { salary: 0, startDate: new Date().toISOString().split('T')[0], envelopes: [] };
    let sandboxData = null;
    let isWhatIf = false;
    let editId = null;

    const resources = {
        en: { translation: {
            app_title: "💰 Salary Planner",
            real_time_plan: "Real-Time Financial Plan",
            act_sandbox: "Activate What-If",
            sandbox_active: "⚠️ Sandbox mode active - changes not saved",
            tab_env: "The Envelopes",
            tab_visual: "Visual Timeline",
            tab_settings: "Settings",
            sec_envelopes: "Monthly Envelopes",
            btn_add_env: "+ Add Envelope",
            col_name: "Name", col_type: "Type", col_target: "Target", col_current: "Current", col_alloc: "Monthly", col_months: "Months", col_due: "Due Date",
            budget: "Budget", debt: "Debt", goal: "Goal",
            lbl_salary: "Total Salary", lbl_debt_pay: "Debt Payment", lbl_goal_sav: "Goal Savings", lbl_unallocated: "Unallocated",
            lbl_total_monthly: "Total Monthly", cat_budget: "Daily Expenses", cat_debt: "Debt Payoff", cat_goal: "Savings Goals",
            lbl_months_due: "months left", lbl_suggested: "Suggested:", warn_short: "Deposit is too low",
            lbl_mon_ded: "Deposit", lbl_permanent: "Permanent", lbl_mon_left: "months left", lbl_remaining: "Remaining",
            quick_dep: "Quick Deposit", btn_update: "Add", btn_edit: "Edit", btn_save: "Save", btn_cancel: "Cancel", btn_reset: "Reset All",
                            lbl_budget: "Expense Budget",
            confirm_del: "Are you sure?", confirm_reset: "RESET ALL DATA?", sec_timeline: "Financial Freedom Timeline",
            sec_config: "Configuration", lbl_monthly_salary: "Monthly Salary", lbl_start_date: "Plan Start Date",
            export: "Export", import: "Import", warning_overAllocated: "Total monthly allocations exceed salary",
            empty_state: "No envelopes yet", empty_state_hint: "Click + Add Envelope to get started", alloc_pct: "Allocated",
            lbl_transaction_history: "Transaction History", lbl_created_on: "Created", lbl_initial_value: "Initial", lbl_deposit_on: "Deposit",
            lbl_no_history: "No history", modal_add: "New Envelope", modal_update: "Update Envelope", btn_history: "History",
            confirm_load_demo: "Load demo data?"
        }},
        ar: { translation: {
            app_title: "💰 مخطط الراتب الذكي",
            real_time_plan: "خطة مالية فورية",
            act_sandbox: "تفعيل وضع التجربة",
            sandbox_active: "⚠️ وضع التجربة نشط - التغييرات لن تُحفظ",
            tab_env: "الأظرف المالية",
            tab_visual: "الجدول الزمني",
            tab_settings: "الإعدادات",
            sec_envelopes: "توزيع الأظرف الشهرية",
            btn_add_env: "+ إضافة ظرف جديد",
            col_name: "الاسم", col_type: "النوع", col_target: "الهدف", col_current: "الحالي", col_alloc: "الشهري", col_months: "الشهور", col_due: "التاريخ",
            budget: "مصاريف", debt: "ديون", goal: "ادخار",
            lbl_salary: "إجمالي الراتب", lbl_debt_pay: "تسديد الديون", lbl_goal_sav: "أهداف الادخار", lbl_unallocated: "المبلغ المتبقي",
            lbl_total_monthly: "إجمالي الاستقطاع", cat_budget: "أظرف المصاريف", cat_debt: "أظرف سداد الديون", cat_goal: "أظرف الأهداف والادخار",
            lbl_months_due: "أشهر متبقية", lbl_suggested: "المقترح:", warn_short: "المبلغ أقل من المطلوب",
            lbl_mon_ded: "الاستقطاع", lbl_permanent: "دائم", lbl_mon_left: "شهور متبقية", lbl_remaining: "المتبقي",
            quick_dep: "إيداع سريع", btn_update: "إضافة", btn_edit: "تعديل", btn_save: "حفظ", btn_cancel: "إلغاء", btn_reset: "إعادة ضبط",
                            lbl_budget: "ميزانية المصاريف",
            confirm_del: "هل أنت متأكد؟", confirm_reset: "إعادة ضبط المصنع؟", sec_timeline: "الجدول الزمني للحرية المالية",
            sec_config: "الإعدادات", lbl_monthly_salary: "الراتب الشهري", lbl_start_date: "تاريخ بدء الخطة",
            export: "تصدير", import: "استيراد", warning_overAllocated: "الاستقطاعات تجاوزت الراتب",
            empty_state: "لا توجد أظرف", empty_state_hint: "اضغط + إضافة ظرف جديد", alloc_pct: "مخصص",
            lbl_transaction_history: "سجل العمليات", lbl_created_on: "تم الإنشاء", lbl_initial_value: "القيمة الابتدائية", lbl_deposit_on: "إيداع",
            lbl_no_history: "لا يوجد سجل", modal_add: "إنشاء ظرف جديد", modal_update: "تحديث ظرف", btn_history: "السجل",
            confirm_load_demo: "تحميل بيانات تجريبية؟"
        }}
    };

    i18next.init({ lng: 'ar', resources }).then(() => {
        updateContent();
        load();
    });

    function toggleLang() {
        i18next.changeLanguage(i18next.language === 'ar' ? 'en' : 'ar').then(() => {
            document.documentElement.dir = i18next.language === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('langBtn').innerText = i18next.language === 'ar' ? 'English' : 'العربية';
            updateContent();
            render();
        });
    }

    function updateContent() {
        document.querySelectorAll('[data-i18n]').forEach(el => {
            el.innerText = i18next.t(el.getAttribute('data-i18n'));
        });
    }

    function load() {
        const saved = localStorage.getItem('salary_planner_v7');
        if(saved) realData = JSON.parse(saved);
        document.getElementById('cfgSalary').value = realData.salary;
        document.getElementById('cfgDate').value = realData.startDate;
        render();
    }

    function render() {
        const d = isWhatIf ? sandboxData : realData;
        let ts = { budget: 0, debt: 0, goal: 0, cur: 0, tar: 0 };
        d.envelopes.forEach(e => {
            ts[e.type] += e.monthly;
            ts.cur += e.current;
            ts.tar += (e.type !== 'budget' ? e.target : 0);
        });
        const unalloc = d.salary - (ts.budget + ts.debt + ts.goal);
        document.getElementById('overAllocWarning').style.display = unalloc < 0 ? 'flex' : 'none';
        
        document.getElementById('highLevelSummary').innerHTML = `
            <div class="stat-card">
                <div class="stat-label">${i18next.t('lbl_salary')}</div>
                <div class="stat-val">${d.salary.toLocaleString()}</div>
            </div>
            <div class="stat-card" style="border-color: var(--danger);">
                <div class="stat-label">${i18next.t('lbl_debt_pay')}</div>
                <div class="stat-val">${ts.debt.toLocaleString()}</div>
            </div>
            <div class="stat-card" style="border-color: var(--success);">
                <div class="stat-label">${i18next.t('lbl_goal_sav')}</div>
                <div class="stat-val">${ts.goal.toLocaleString()}</div>
            </div>
                        <div class="stat-card" style="border-color: var(--warning);">
                <div class="stat-label">${i18next.t('lbl_budget')}</div>
                <div class="stat-val">${ts.budget.toLocaleString()}</div>
                        </div>
        <div class="stat-card" style="border-color: var(--primary);">
                <div class="stat-label">${i18next.t('lbl_unallocated')}</div>
            <div class="stat-val" style="color: ${unalloc < 0 ? 'var(--danger)' : 'inherit'}">${unalloc.toLocaleString()}</div>
            <div class="stat-sub">${(Math.round((d.salary-unalloc)/d.salary*100)||0)}% ${i18next.t('alloc_pct')}</div>
        </div>        
        `;
        renderTable(d);
        renderCards(d);
        renderTimeline();
    }

    function renderTable(d) {
        let h = `<table><thead><tr>
            <th>${i18next.t('col_name')}</th><th>${i18next.t('col_type')}</th>
            <th>${i18next.t('col_target')}</th><th>${i18next.t('col_current')}</th>
            <th>${i18next.t('col_alloc')}</th><th>${i18next.t('col_months')}</th>
        </tr></thead><tbody>`;
        d.envelopes.forEach(e => {
            const rem = Math.max(0, (e.target || 0) - e.current);
            const months = e.monthly > 0 ? Math.ceil(rem / e.monthly) : '-';
            h += `<tr><td>${e.name}</td><td><span class="badge badge-${e.type}">${i18next.t(e.type)}</span></td>
                <td>${(e.target || 0).toLocaleString()}</td><td>${e.current.toLocaleString()}</td>
                <td>${e.monthly.toLocaleString()}</td><td>${months}</td></tr>`;
        });
        h += `</tbody></table>`;
        document.getElementById('summaryTableContainer').innerHTML = h;
    }

    function renderCards(d) {
        const cont = document.getElementById('categorySections');
        cont.innerHTML = '';
        if(d.envelopes.length === 0) {
            cont.innerHTML = `<div style="text-align:center;padding:60px 20px;color:var(--text-muted);"><h3>${i18next.t('empty_state')}</h3></div>`;
            return;
        }
        ['budget', 'debt', 'goal'].forEach(type => {
            const envs = d.envelopes.filter(e => e.type === type);
            if(envs.length === 0) return;
            const block = document.createElement('div');
            block.innerHTML = `<h3 style="margin: 30px 0 15px; border-bottom: 2px solid #eee;">${i18next.t('cat_' + type)}</h3><div class="env-grid" id="grid-${type}"></div>`;
            cont.appendChild(block);
            const grid = document.getElementById('grid-' + type);
            envs.forEach(e => {
                const prog = e.type === 'budget' ? 100 : Math.min(100, (e.current / (e.target || 1)) * 100);
                grid.innerHTML += `
                    <div class="env-card ${e.type}">
                        <div style="display:flex; justify-content:space-between;">
                            <div><strong>${e.name}</strong></div>
                            <div>
                                <button class="btn" onclick="openEditModal(${e.id})">✎</button>
                                <button class="btn" style="background:var(--danger);color:white" onclick="delEnv(${e.id})">✕</button>
                            </div>
                        </div>
                        <div class="progress-container"><div class="progress-bar" style="width:${prog}%; background:var(--${e.type==='goal'?'success':e.type==='debt'?'danger':'warning'});\"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:13px;">
                            <span>${i18next.t('lbl_mon_ded')}: ${e.monthly}</span>
                            <span>${e.current.toLocaleString()} / ${(e.target || 0).toLocaleString()}</span>
                        </div>
                        <div style="margin-top:15px; display:flex; gap:10px;">
                            <input type="number" id="q-${e.id}" class="field" value="${e.monthly}" style="margin:0; flex:1">
                            <button class="btn" style="background:var(--success);color:white" onclick="quickUp(${e.id})">${i18next.t('btn_update')}</button>
                        </div>
                    </div>`;
            });
        });
    }

    function showTab(t) {
        document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
        document.getElementById(t + 'Section').classList.add('active');
        document.getElementById('tab-' + t).classList.add('active');
    }

    function toggleWhatIf() {
        isWhatIf = !isWhatIf;
        if(isWhatIf) sandboxData = JSON.parse(JSON.stringify(realData));
        document.body.classList.toggle('what-if-active', isWhatIf);
        render();
    }

    function openAddModal() {
        editId = null;
        document.getElementById('envForm').reset();
        document.getElementById('modalTitle').innerText = i18next.t('modal_add');
        toggleModalFields();
        document.getElementById('envModal').classList.add('active');
    }

    function openEditModal(id) {
        editId = id;
        const d = isWhatIf ? sandboxData : realData;
        const e = d.envelopes.find(i => i.id === id);
        document.getElementById('mName').value = e.name;
        document.getElementById('mType').value = e.type;
        document.getElementById('mTarget').value = e.target || '';
        document.getElementById('mDue').value = e.dueDate || '';
        document.getElementById('mCurrent').value = e.current;
        document.getElementById('mMonthly').value = e.monthly;
        document.getElementById('modalTitle').innerText = i18next.t('modal_update');
        toggleModalFields();
        document.getElementById('envModal').classList.add('active');
    }

    function closeModal() { document.getElementById('envModal').classList.remove('active'); }

    function saveEnv(ev) {
        ev.preventDefault();
        const d = isWhatIf ? sandboxData : realData;
        const e = {
            id: editId || Date.now(),
            name: document.getElementById('mName').value,
            type: document.getElementById('mType').value,
            target: parseFloat(document.getElementById('mTarget').value) || 0,
            dueDate: document.getElementById('mDue').value,
            current: parseFloat(document.getElementById('mCurrent').value) || 0,
            monthly: parseFloat(document.getElementById('mMonthly').value) || 0,
            history: editId ? (d.envelopes.find(i => i.id === editId).history || []) : [{type: 'created', date: new Date().toISOString(), amount: parseFloat(document.getElementById('mCurrent').value) || 0}]
        };
        if(editId) {
            const idx = d.envelopes.findIndex(i => i.id === editId);
            d.envelopes[idx] = e;
        } else d.envelopes.push(e);
        if(!isWhatIf) localStorage.setItem('salary_planner_v7', JSON.stringify(realData));
        closeModal(); render();
    }

    function quickUp(id) {
        const val = parseFloat(document.getElementById('q-' + id).value) || 0;
        const d = isWhatIf ? sandboxData : realData;
        const e = d.envelopes.find(i => i.id === id);
        if(e && val > 0) {
            e.current += val;
            if(!e.history) e.history = [];
            e.history.push({type: 'deposit', date: new Date().toISOString(), amount: val});
            if(!isWhatIf) localStorage.setItem('salary_planner_v7', JSON.stringify(realData));
            render();
        }
    }

    function delEnv(id) {
        if(!confirm(i18next.t('confirm_del'))) return;
        const d = isWhatIf ? sandboxData : realData;
        d.envelopes = d.envelopes.filter(i => i.id !== id);
        if(!isWhatIf) localStorage.setItem('salary_planner_v7', JSON.stringify(realData));
        render();
    }

    function updateGlobal() {
        const d = isWhatIf ? sandboxData : realData;
        d.salary = parseFloat(document.getElementById('cfgSalary').value) || 0;
        d.startDate = document.getElementById('cfgDate').value;
        if(!isWhatIf) localStorage.setItem('salary_planner_v7', JSON.stringify(realData));
        render();
    }

    function renderTimeline() {
        const d = isWhatIf ? sandboxData : realData;
        const ch = document.getElementById('ganttChart');
        ch.innerHTML = '';
        d.envelopes.filter(e => e.type !== 'budget').forEach(e => {
            const rem = Math.max(0, (e.target || 0) - e.current);
            const dur = e.monthly > 0 ? Math.ceil(rem / e.monthly) : 0;
            const wp = Math.min(100, (dur / 24) * 100);
            ch.innerHTML += `<div style="display:grid; grid-template-columns:120px 1fr; gap:15px; align-items:center;">
                <div style="font-weight:700; font-size:13px;">${e.name}</div>
                <div style="height:20px; background:#f1f5f9; border-radius:10px; overflow:hidden;">
                    <div style="width:${wp}%; height:100%; background:var(--${e.type==='goal'?'success':'danger'}); display:flex; align-items:center; padding:0 10px; color:white; font-size:10px;">${dur} ${i18next.t('col_months')}</div>
                </div>
            </div>`;
        });
    }

    function exportData() {
        const b = new Blob([JSON.stringify(realData, null, 2)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `salary-planner.json`; a.click();
    }

    function importData(ev) {
        const f = ev.target.files[0];
        if(!f) return;
        const r = new FileReader();
        r.onload = (e) => {
            realData = JSON.parse(e.target.result);
            localStorage.setItem('salary_planner_v7', JSON.stringify(realData));
            location.reload();
        };
        r.readAsText(f);
    }

    function resetAll() {
        if(!confirm(i18next.t('confirm_reset'))) return;
                localStorage.removeItem('salary_planner_v7');
        location.reload();
    }

    function toggleModalFields() {
        const t = document.getElementById('mType').value;
        document.getElementById('targetGrp').style.display = t === 'budget' ? 'none' : 'block';
        document.getElementById('dueGrp').style.display = t === 'budget' ? 'none' : 'block';
    }

    function loadDemoData() {
        if (!confirm(i18next.t('confirm_load_demo'))) return;
        const demoData = {
            salary: 5000, startDate: new Date().toISOString().split('T')[0],
            envelopes: [
                {id: 1, name: 'إيجار ومرافق', target: 2000, current: 0, monthly: 1800, type: 'budget'},
                {id: 2, name: 'صندوق الطوارئ', target: 5000, current: 500, monthly: 500, type: 'goal'},
                {id: 3, name: 'قرض شخصي', target: 8000, current: 2000, monthly: 1000, type: 'debt'},
                {id: 4, name: 'بقالة', target: 1200, current: 0, monthly: 1000, type: 'budget'},
                {id: 5, name: 'جهاز لابتوب جديد', target: 3500, current: 1200, monthly: 400, type: 'goal'}
            ]
        };
        localStorage.setItem('salary_planner_v7', JSON.stringify(demoData));
        location.reload();
    }

    document.getElementById('langBtn').addEventListener('click', toggleLang);
    document.getElementById('sandboxBtn').addEventListener('click', toggleWhatIf);
    document.getElementById('exportBtn').addEventListener('click', exportData);
    document.getElementById('importBtn').addEventListener('click', () => document.getElementById('fileInput').click());
    document.getElementById('demoBtn').addEventListener('click', loadDemoData);
    document.getElementById('envForm').addEventListener('submit', saveEnv);
</script>
</body>
</html>
